<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Mrayti Digital</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f4f1ea; font-family: 'Segoe UI', Tahoma, sans-serif; }
        #particles-js { position: absolute; width: 100%; height: 100%; z-index: 1; }
        
        /* اللوغو في الجنب */
        .logo-side {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 150px;
            z-index: 3;
            border-radius: 10px;
        }

        .content { 
            position: relative; 
            z-index: 2; 
            text-align: center; 
            padding-top: 15%; 
            color: #333;
        }

        .btn-container { margin-top: 50px; display: flex; justify-content: center; }
        .btn { padding: 15px 40px; font-size: 1.2rem; border-radius: 30px; cursor: pointer; text-decoration: none; font-weight: 600; border: none; background-color: #333; color: white; transition: 0.3s; }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <img src="logo.jpeg" alt="Mrayti Digital" class="logo-side">

    <div class="content">
        <h1>مرحباً بك في</h1>
        <h1 style="font-size: 3.5em;">MIRAITI DIGITAL</h1>
        <p>نصنع رؤيتك الرقمية باحترافية 📸</p>

        <div class="btn-container">
            <a href="contact.html" id="btn-escape" class="btn">اطلب صناعة الويب خاص بك</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
          "particles": { "number": { "value": 100 }, "color": { "value": "#c5b39a" }, "line_linked": { "enable": true, "color": "#c5b39a" }, "move": { "enable": true, "speed": 1 } },
          "interactivity": { "events": { "onhover": { "enable": true, "mode": "repulse" } } }
        });

        let count = 0;
        const escapeBtn = document.getElementById('btn-escape');

        escapeBtn.addEventListener('mouseover', function() {
            if (count < 3) {
                escapeBtn.style.position = 'absolute';
                escapeBtn.style.left = Math.floor(Math.random() * (window.innerWidth - 200)) + 'px';
                escapeBtn.style.top = Math.floor(Math.random() * (window.innerHeight - 50)) + 'px';
                count++;
            } else {
                escapeBtn.style.position = 'static';
            }
        });
    </script>
</body>
</html>
